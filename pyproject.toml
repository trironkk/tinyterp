[project]
name = "tinyterp"
version = "0.1.0"
description = "Personal explorations of the mechanistic interpretability domain."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "einops>=0.8.2",
    "numpy>=2.4.4",
    "torch>=2.12.0",
    "transformers>=5.8.1",
]

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "matplotlib>=3.10.9",
    "nbstripout>=0.9.1",
    "pytest>=9.0.3",
    "ruff>=0.15.13",
]
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
