name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Check markdown formatting
        run: git ls-files '*.md' | xargs uv run --only-group lint mdformat --check
